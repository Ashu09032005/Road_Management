version: "3"

services:
  osrm:
    image: osrm/osrm-backend
    command: osrm-routed /data/india-latest.osrm
    volumes:
      - ./osrm-data:/data
    ports:
      - "5000:5000"

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - osrm
    environment:
      - OSRM_URL=http://osrm:5000