<!DOCTYPE html>

<html>
<head>
    <title>Login</title>


    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;

            background: url('/bg-map.png') no-repeat center center fixed;
            background-size: cover;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
            z-index: 0;
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;

            width: 360px;
            padding: 40px 30px;

            border-radius: 20px;

            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);

            box-shadow: 0 15px 40px rgba(0,0,0,0.4);

            text-align: center;
        }

        /* Title */
        h1 {
            font-size: 20px;
            margin-bottom: 15px;
        }

        /* Welcome */
        h2 {
            font-size: 26px;
            margin: 10px 0;
        }

        /* Subtitle */
        p {
            color: gray;
            margin-bottom: 25px;
        }

        /* Button */
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;

            padding: 12px;
            width: 100%;

            border-radius: 12px;
            border: 1px solid #ddd;

            background: white;
            font-size: 15px;

            cursor: pointer;
            transition: 0.3s ease;
        }

        .google-btn:hover {
            background: #f5f5f5;
            transform: translateY(-2px);
        }

        .google-btn img {
            width: 20px;
        }
    </style>


</head>

<body>

<div class="card">

    <h1>Disaster Aware Smart Routing System</h1>

    <h2>Welcome 👋</h2>

    <p>Sign in to continue</p>

    <a href="/oauth2/authorization/google">
        <button class="google-btn">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg">
            Sign in with Google
        </button>
    </a>


</div>

</body>
</html>
